version: "3.9"

services:
  app:
    image: python:3.11-slim
    container_name: copilotpersona-app
    working_dir: /workspace
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"
    env_file:
      - .env.example
    volumes:
      - ./:/workspace
    ports:
      - "8000:8000"
    networks:
      - copilotpersona-net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: copilotpersona-prometheus
    command: >
      sh -c "cat <<'EOF' > /etc/prometheus/prometheus.yml
      global:
        scrape_interval: 15s
      scrape_configs:
        - job_name: 'copilotpersona-fastapi'
          metrics_path: /metrics
          static_configs:
            - targets: ['app:8000']
      EOF
      && /bin/prometheus --config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"
    networks:
      - copilotpersona-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: copilotpersona-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    networks:
      - copilotpersona-net
    restart: unless-stopped
    depends_on:
      - prometheus

networks:
  copilotpersona-net:
    driver: bridge
